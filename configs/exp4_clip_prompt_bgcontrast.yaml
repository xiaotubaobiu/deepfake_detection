_base_: configs/base.yaml
experiment_name: exp4_clip_prompt_bgcontrast
model:
  name: clip_prompt_bgcontrast
  clip_model_name: ViT-B/16
  projection_dim: 256
loss:
  name: cross_entropy_plus_bgface_contrast
  lambda_align: 0.1
  temperature: 0.07
  alpha: 0.3
  num_bg_patches: 4
data:
  require_aligned_triplets: true
train:
  per_gpu_batch: 128
  lr: 2.0e-05
  weight_decay: 0.0005
  epochs: 5
  patience: 3
  seed: 42
